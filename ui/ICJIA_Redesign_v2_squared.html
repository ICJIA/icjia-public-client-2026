<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ICJIA — Illinois Criminal Justice Information Authority</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #0a0f1a;
    --bg-2: #0f1626;
    --bg-3: #131c30;
    --surface: #182238;
    --surface-2: #1e2a44;
    --border: rgba(255,255,255,0.08);
    --border-2: rgba(255,255,255,0.14);
    --text: #e8edf7;
    --text-2: #a8b2c8;
    --text-3: #6e7a92;
    --accent: #2f6bff;
    --accent-2: #10b981;
    --accent-warn: #f59e0b;
    --hero-overlay: rgba(8, 12, 22, 0.72);
    --card-bg: #131c30;
    --card-border: rgba(255,255,255,0.06);
    --card-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 40px -12px rgba(0,0,0,0.6);
  }
  [data-theme="light"] {
    --bg: #f6f7fb;
    --bg-2: #ffffff;
    --bg-3: #eef1f7;
    --surface: #ffffff;
    --surface-2: #f1f4fa;
    --border: rgba(10,15,26,0.08);
    --border-2: rgba(10,15,26,0.14);
    --text: #0b1324;
    --text-2: #475069;
    --text-3: #7a8296;
    --hero-overlay: rgba(10, 20, 40, 0.55);
    --card-bg: #ffffff;
    --card-border: rgba(10,15,26,0.08);
    --card-shadow: 0 1px 2px rgba(10,15,26,0.04), 0 8px 24px -12px rgba(10,15,26,0.12);
  }
  [data-cardstyle="glass"] {
    --card-bg: rgba(24,34,56,0.55);
    --card-border: rgba(255,255,255,0.10);
    --card-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 8px 30px -8px rgba(0,0,0,0.5);
  }
  [data-theme="light"][data-cardstyle="glass"] {
    --card-bg: rgba(255,255,255,0.7);
    --card-border: rgba(10,15,26,0.08);
  }
  [data-cardstyle="bordered"] {
    --card-bg: transparent;
    --card-border: rgba(255,255,255,0.18);
    --card-shadow: none;
  }
  [data-theme="light"][data-cardstyle="bordered"] {
    --card-border: rgba(10,15,26,0.18);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv11', 'ss01';
    letter-spacing: -0.005em;
    scroll-behavior: smooth;
    transition: background .25s ease, color .25s ease;
  }
  html { scroll-behavior: smooth; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 28px; }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 40;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: color-mix(in oklab, var(--bg) 78%, transparent);
    border-bottom: 1px solid var(--border);
    transition: background .25s ease, border-color .25s ease;
  }
  .nav.scrolled { background: color-mix(in oklab, var(--bg) 92%, transparent); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 40px; height: 40px; border-radius: 0;
    background: linear-gradient(135deg, var(--accent) 0%, #1e4fd1 100%);
    display: grid; place-items: center;
    font-weight: 800; font-size: 15px; color: #fff;
    letter-spacing: 0.02em;
    box-shadow: 0 6px 16px -6px rgba(47,107,255,0.6);
  }
  .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .logo-text .t1 { font-weight: 800; font-size: 17px; letter-spacing: 0.02em; }
  .logo-text .t2 { font-size: 10.5px; color: var(--text-2); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }
  .nav-links { display: flex; align-items: center; gap: 4px; }
  .nav-links a {
    padding: 8px 14px; border-radius: 8px; font-size: 13.5px; font-weight: 500;
    color: var(--text-2); letter-spacing: 0.04em; text-transform: uppercase;
    transition: color .15s, background .15s;
  }
  .nav-links a:hover { color: var(--text); background: var(--surface); }
  .nav-links a.active { color: var(--text); }
  .nav-actions { display: flex; align-items: center; gap: 6px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 9px;
    display: grid; place-items: center;
    color: var(--text-2);
    transition: color .15s, background .15s;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface); }
  .mobile-only { display: none; }
  @media (max-width: 820px) {
    .nav-links { display: none; }
    .mobile-only { display: grid; }
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 520px;
    display: flex; align-items: center;
    overflow: hidden;
    isolation: isolate;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: -2;
    background-size: cover; background-position: center;
    transition: opacity .4s ease;
  }
  .hero-bg.skyline {
    background-image:
      linear-gradient(180deg, rgba(10,15,26,0.35) 0%, rgba(10,15,26,0.90) 100%),
      url('https://images.unsplash.com/photo-1494522855154-9297ac14b55f?auto=format&fit=crop&w=2400&q=80');
    filter: saturate(0.7) brightness(0.75);
  }
  .hero-bg.gradient {
    background:
      radial-gradient(1000px 500px at 30% 30%, rgba(47,107,255,0.25), transparent 60%),
      radial-gradient(800px 500px at 80% 70%, rgba(16,185,129,0.15), transparent 60%),
      linear-gradient(180deg, #0a1024 0%, #0a0f1a 100%);
  }
  .hero-bg.map {
    background: #0a0f1a;
  }
  .hero-bg.map::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent 0, transparent 48px, rgba(47,107,255,0.07) 48px, rgba(47,107,255,0.07) 49px),
      repeating-linear-gradient(90deg, transparent 0, transparent 48px, rgba(47,107,255,0.07) 48px, rgba(47,107,255,0.07) 49px),
      radial-gradient(600px 400px at 50% 50%, rgba(47,107,255,0.12), transparent 70%);
  }
  .hero-overlay {
    position: absolute; inset: 0; z-index: -1;
    background: linear-gradient(180deg, transparent 40%, var(--bg) 100%);
  }

  .hero-content {
    padding: 80px 0;
    max-width: 820px;
    margin: 0 auto;
    text-align: center;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(47,107,255,0.12); color: #8fb3ff;
    border: 1px solid rgba(47,107,255,0.25);
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
    margin-bottom: 20px;
  }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-2); box-shadow: 0 0 12px var(--accent-2); }
  .hero h1 {
    font-size: clamp(38px, 5.6vw, 64px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin: 0 0 18px;
    color: #fff;
  }
  [data-theme="light"] .hero h1 { color: #fff; } /* hero stays dark over image */
  .hero p.lede {
    font-size: 17px; line-height: 1.6;
    color: rgba(232,237,247,0.82);
    max-width: 620px; margin: 0 auto 32px;
  }
  .cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    height: 46px; padding: 0 22px; border-radius: 0;
    font-weight: 600; font-size: 13.5px;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: transform .15s, box-shadow .15s, background .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 8px 24px -8px rgba(47,107,255,0.6); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 30px -8px rgba(47,107,255,0.7); }
  .btn-secondary { background: var(--accent-2); color: #052e1f; }
  .btn-secondary:hover { transform: translateY(-1px); box-shadow: 0 14px 30px -8px rgba(16,185,129,0.5); }
  .btn-ghost { background: transparent; border: 1px solid var(--border-2); color: var(--text); }
  .btn-ghost:hover { background: var(--surface); }
  .pill-new {
    padding: 2px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.18); color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  }

  /* SECTIONS */
  section { padding: 80px 0; }
  .section-head { display: flex; align-items: end; justify-content: space-between; margin-bottom: 32px; gap: 20px; flex-wrap: wrap; }
  .section-title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-2); margin: 0 0 6px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::before {
    content: ''; width: 24px; height: 1px; background: var(--accent);
  }
  .section-h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  .see-all {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text-2);
    transition: color .15s, gap .15s;
  }
  .see-all:hover { color: var(--accent); gap: 10px; }

  /* NEWS */
  .news-filters {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .chip {
    padding: 7px 14px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500; letter-spacing: 0.02em;
    background: var(--surface); color: var(--text-2);
    border: 1px solid var(--border);
    transition: all .15s;
  }
  .chip:hover { color: var(--text); border-color: var(--border-2); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .news-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 20px;
  }
  @media (max-width: 860px) { .news-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 0;
    box-shadow: var(--card-shadow);
    overflow: hidden;
    transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--border-2); }

  .news-feature { display: flex; flex-direction: column; }
  .news-feature .thumb {
    aspect-ratio: 16/10; background-size: cover; background-position: center;
    position: relative;
  }
  .news-feature .thumb::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 40%, rgba(10,15,26,0.7) 100%);
  }
  .tag {
    position: absolute; top: 14px; left: 14px; z-index: 1;
    padding: 4px 10px; border-radius: 0;
    background: rgba(10,15,26,0.72); backdrop-filter: blur(8px);
    color: #fff;
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .news-feature .body { padding: 24px; }
  .news-feature h3 { font-size: 22px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.25; margin: 0 0 10px; text-wrap: balance; }
  .news-feature .meta { font-size: 12px; color: var(--text-3); letter-spacing: 0.04em; display: flex; align-items: center; gap: 8px; }

  .news-side { display: flex; flex-direction: column; gap: 16px; }
  .news-item {
    display: grid; grid-template-columns: 44px 1fr; gap: 16px;
    padding: 20px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 0;
    transition: transform .15s, border-color .15s, background .15s;
    cursor: pointer;
  }
  .news-item:hover { transform: translateY(-1px); border-color: var(--border-2); }
  .news-icon {
    width: 44px; height: 44px; border-radius: 0;
    background: color-mix(in oklab, var(--accent) 14%, transparent);
    color: var(--accent);
    display: grid; place-items: center;
  }
  .news-item h4 { font-size: 15px; font-weight: 600; line-height: 1.35; margin: 0 0 6px; letter-spacing: -0.005em; text-wrap: pretty; }
  .news-item .meta { font-size: 11.5px; color: var(--text-3); letter-spacing: 0.04em; }

  /* QUICK LINKS TABS */
  .tabs-section { padding-top: 20px; }
  .tabs-wrap {
    background: linear-gradient(180deg, rgba(47,107,255,0.06), rgba(47,107,255,0.02));
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 8px;
  }
  .tabs {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    padding: 6px;
  }
  .tab {
    padding: 16px; border-radius: 0;
    font-size: 12.5px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--text-2);
    transition: all .2s;
    position: relative;
  }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active { color: #fff; background: var(--accent); box-shadow: 0 6px 20px -8px rgba(47,107,255,0.7); }

  .tab-panel {
    padding: 32px 24px;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 760px) { .tab-panel { grid-template-columns: 1fr; } }

  .quick-card {
    padding: 24px; border-radius: 0;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    box-shadow: var(--card-shadow);
    transition: transform .2s, border-color .2s, background .2s;
    display: flex; flex-direction: column; gap: 12px;
    cursor: pointer; position: relative; overflow: hidden;
  }
  .quick-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .quick-card::after {
    content: '→'; position: absolute; bottom: 18px; right: 22px;
    font-size: 18px; color: var(--text-3);
    transition: transform .2s, color .2s;
  }
  .quick-card:hover::after { transform: translate(4px, 0); color: var(--accent); }
  .quick-icon {
    width: 44px; height: 44px; border-radius: 0;
    background: color-mix(in oklab, var(--accent) 14%, transparent);
    color: var(--accent);
    display: grid; place-items: center;
    margin-bottom: 4px;
  }
  .quick-card h4 { font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; margin: 0; }
  .quick-card p { font-size: 14px; line-height: 1.55; color: var(--text-2); margin: 0; }

  /* RESEARCH */
  .research-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
  }
  @media (max-width: 760px) { .research-grid { grid-template-columns: 1fr; } }
  .research-card {
    display: grid; grid-template-columns: 140px 1fr;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 0;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    transition: transform .2s, border-color .2s;
    cursor: pointer;
  }
  .research-card:hover { transform: translateY(-2px); border-color: var(--border-2); }
  .research-card .thumb {
    background-size: cover; background-position: center;
    min-height: 140px;
  }
  .research-card .body { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .research-card h4 { font-size: 15px; font-weight: 600; line-height: 1.35; margin: 0; letter-spacing: -0.005em; text-wrap: pretty; }
  .research-card p { font-size: 12.5px; line-height: 1.5; color: var(--text-2); margin: 0; }
  .research-card .kicker { font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }

  /* STATS */
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    padding: 32px; border-radius: 0;
    background: linear-gradient(135deg, rgba(47,107,255,0.08), rgba(16,185,129,0.04));
    border: 1px solid var(--border);
    margin-top: 40px;
  }
  @media (max-width: 760px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat .n { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; }
  .stat .l { font-size: 11.5px; color: var(--text-2); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  /* FOOTER */
  footer {
    background: var(--bg-2);
    border-top: 1px solid var(--border);
    padding: 48px 0 32px;
    margin-top: 40px;
  }
  .footer-top {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 40px; margin-bottom: 40px;
  }
  @media (max-width: 760px) { .footer-top { grid-template-columns: 1fr 1fr; } }
  .footer-col h5 {
    font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--text-3); margin: 0 0 14px;
  }
  .footer-col a {
    display: block; padding: 6px 0; font-size: 13.5px; color: var(--text-2);
    transition: color .15s;
  }
  .footer-col a:hover { color: var(--accent); }
  .footer-about { font-size: 13px; line-height: 1.6; color: var(--text-2); max-width: 320px; }
  .footer-bottom {
    border-top: 1px solid var(--border);
    padding-top: 24px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text-3); flex-wrap: wrap; gap: 12px;
  }

  /* SEARCH MODAL */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(5,8,16,0.72); backdrop-filter: blur(6px);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 12vh;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: min(640px, 92vw);
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6);
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { transform: translateY(-10px); opacity: 0; } to { transform: none; opacity: 1; } }
  .search-input-wrap {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .search-input-wrap input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font: 500 16px 'Inter', sans-serif;
  }
  .search-input-wrap input::placeholder { color: var(--text-3); }
  .kbd {
    padding: 3px 7px; border-radius: 5px;
    background: var(--surface-2); color: var(--text-2);
    font: 500 11px 'JetBrains Mono', monospace;
    border: 1px solid var(--border);
  }
  .search-results { max-height: 50vh; overflow-y: auto; padding: 8px; }
  .search-result {
    padding: 12px 14px; border-radius: 8px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .search-result:hover, .search-result.focused { background: var(--surface); }
  .search-result .icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface-2); display: grid; place-items: center;
    color: var(--text-2);
  }
  .search-result .t { font-size: 14px; font-weight: 500; }
  .search-result .s { font-size: 12px; color: var(--text-3); }

  /* MOBILE MENU */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 90;
    background: var(--bg);
    padding: 88px 28px 32px;
    animation: slideIn .2s ease;
    overflow-y: auto;
  }
  @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .mobile-menu a {
    display: block; padding: 18px 0;
    font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
    border-bottom: 1px solid var(--border);
  }

  /* TWEAKS PANEL */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 60;
    width: 280px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 0;
    padding: 16px;
    box-shadow: 0 20px 50px -15px rgba(0,0,0,0.6);
    animation: modalIn .2s ease;
  }
  .tweaks-panel h6 { margin: 0 0 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-2); }
  .tweaks-group { margin-bottom: 14px; }
  .tweaks-group label { display: block; font-size: 11.5px; color: var(--text-3); margin-bottom: 6px; letter-spacing: 0.04em; }
  .tweak-row { display: flex; gap: 6px; }
  .tweak-btn {
    flex: 1; padding: 8px 10px; border-radius: 8px;
    font-size: 11.5px; font-weight: 500;
    background: var(--surface); color: var(--text-2);
    border: 1px solid var(--border); transition: all .15s;
  }
  .tweak-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tweak-btn:hover:not(.active) { color: var(--text); border-color: var(--border-2); }

  /* fade in on scroll */
  .fade-in { opacity: 0; transform: translateY(12px); transition: opacity .6s ease, transform .6s ease; }
  .fade-in.visible { opacity: 1; transform: none; }

  /* thumbnails: subtle striped placeholders for imagery */
  .thumb-placeholder {
    background:
      linear-gradient(135deg, rgba(47,107,255,0.15), rgba(16,185,129,0.1)),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 10px, transparent 10px 20px),
      #1a2540;
    display: grid; place-items: center;
    color: var(--text-3);
    font: 500 10.5px 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<script type="text/babel" data-presets="env,react">

// icon helper
const Icon = ({ name, size = 20 }) => {

  const paths = {
    search: <><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></>,
    menu: <><path d="M4 7h16M4 12h16M4 17h16"/></>,
    close: <><path d="M18 6 6 18M6 6l12 12"/></>,
    sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></>,
    moon: <><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></>,
    news: <><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h10M7 16h6"/></>,
    doc: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h6"/></>,

    mail: <><rect x="2" y="5" width="20" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></>,
    tools: <><path d="M14.7 6.3a4 4 0 0 0 5 5l-7.9 7.9a2 2 0 1 1-2.8-2.8l5.7-5.7a4 4 0 0 1 0-4.4z"/></>,
    calendar: <><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></>,
    briefcase: <><rect x="2" y="7" width="20" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M2 13h20"/></>,
    book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z"/><path d="M4 19.5V22h16"/></>,

    users: <><circle cx="9" cy="8" r="3.5"/><path d="M2 21c0-3.3 3.1-6 7-6s7 2.7 7 6"/><circle cx="17" cy="8" r="3"/><path d="M22 21c0-2.6-2.2-5-5-5"/></>,
    arrow: <><path d="M5 12h14M13 5l7 7-7 7"/></>,
  };
  return <svg {...common}>{paths[name]}</svg>;
};

const NEWS_ITEMS = [

const RESEARCH = [

const SEARCH_SUGGESTIONS = [

  { t: "Trauma recovery center grantees", s: "Funding", icon: "edit" },

function Nav({ onSearch, onMenu, theme, onToggleTheme }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className={`nav ${scrolled ? 'scrolled' : ''}`}>
      <div className="wrap nav-inner">
        <a className="logo" href="#">
          <div className="logo-mark">ICJIA</div>
          <div className="logo-text">
            <span className="t1">ICJIA</span>
            <span className="t2">Illinois Criminal Justice<br/>Information Authority</span>
          </div>
        </a>
        <div className="nav-links">
          <a href="#about" className="active">About</a>
          <a href="#research">Research</a>
          <a href="#grants">Grant Resources</a>
          <a href="#partners">Partners</a>
          <a href="#news">News</a>
        </div>
        <div className="nav-actions">
          <button className="icon-btn" onClick={onSearch} aria-label="Search"><Icon name="search"/></button>
          <button className="icon-btn" onClick={onToggleTheme} aria-label="Toggle theme">
            <Icon name={theme === 'dark' ? 'sun' : 'moon'} />

}

function Hero({ variant }) {
  return (
    <div className="hero">
      <div className={`hero-bg ${variant}`}></div>
      <div className="hero-overlay"></div>
      <div className="wrap hero-content">

        <h1>Illinois Criminal Justice Information Authority</h1>
        <p className="lede">A state agency dedicated to improving the administration of criminal justice in Illinois through research, funding, and coordination across the justice system.</p>
        <div className="cta-row">
          <a href="#grants" className="btn btn-primary">Apply for Funding <Icon name="arrow" size={16}/></a>
          <a href="#grants" className="btn btn-secondary">Grant Status Request <span className="pill-new">NEW</span></a>
        </div>
      </div>
    </div>
  );
}

function NewsSection() {
  const [filter, setFilter] = useState('all');
  const filters = [
    { id: 'all', label: 'All' },
    { id: 'news', label: 'News' },
    { id: 'grants', label: 'Grants' },
    { id: 'research', label: 'Research' },
    { id: 'meetings', label: 'Meetings' },
  ];
  const filtered = useMemo(() => filter === 'all' ? NEWS_ITEMS : NEWS_ITEMS.filter(n => n.category === filter), [filter]);
  const feature = filtered.find(n => n.featured) || filtered[0];
  const rest = filtered.filter(n => n !== feature).slice(0, 4);

  return (
    <section id="news">
      <div className="wrap">
        <div className="section-head">
          <div>
            <div className="section-title">News &amp; Information</div>
            <h2 className="section-h2">Latest from the Authority</h2>
          </div>
          <a href="#" className="see-all">View all news <Icon name="arrow" size={14}/></a>
        </div>
        <div className="news-filters">
          {filters.map(f => (
            <button key={f.id} className={`chip ${filter === f.id ? 'active' : ''}`} onClick={() => setFilter(f.id)}>
              {f.label}
            </button>
          ))}
        </div>
        <div className="news-grid">
          {feature && (
            <article className="card news-feature">
              <div className="thumb" style={feature.image ? { backgroundImage: `url(${feature.image})` } : {}}>
                {!feature.image && <div className="thumb-placeholder" style={{height:'100%'}}>[ hero image ]</div>}
                <span className="tag">{feature.tag}</span>
              </div>
              <div className="body">
                <h3>{feature.title}</h3>
                <div className="meta">{feature.date} · 4 min read</div>
              </div>
            </article>
          )}
          <div className="news-side">
            {rest.map((n, i) => (
              <article key={i} className="news-item">
                <div className="news-icon"><Icon name={n.icon || 'news'}/></div>
                <div>
                  <h4>{n.title}</h4>
                  <div className="meta">{n.tag} · {n.date}</div>
                </div>
              </article>
            ))}
            {rest.length === 0 && (
              <div style={{padding:'40px 20px', textAlign:'center', color:'var(--text-3)', fontSize:13}}>
                No items match this filter.
              </div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

          <div className="tab-panel">

              <div key={i} className="quick-card">

function ResearchSection() {

        <div className="section-head">

        <div className="stats">

          <div className="stat"><div className="n">212</div><div className="l">Active Subrecipients</div></div>
          <div className="stat"><div className="n">41</div><div className="l">Illinois Counties Served</div></div>
          <div className="stat"><div className="n">63</div><div className="l">Published Reports 2025</div></div>

function Footer() {

            </div>
            <p className="footer-about">A state agency improving the administration of criminal justice in Illinois through research, funding, and coordination.</p>
          </div>
          <div className="footer-col">
            <h5>Agency</h5>

          <div className="footer-col">

function SearchModal({ open, onClose }) {
  const [q, setQ] = useState('');
  const [focus, setFocus] = useState(0);
  const ref = useRef(null);
  useEffect(() => { if (open) setTimeout(() => ref.current?.focus(), 30); }, [open]);
  useEffect(() => {
    const onKey = (e) => {
      if (!open) return;
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowDown') { e.preventDefault(); setFocus(f => Math.min(f+1, results.length-1)); }
      if (e.key === 'ArrowUp') { e.preventDefault(); setFocus(f => Math.max(f-1, 0)); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });
  const results = q
    ? SEARCH_SUGGESTIONS.filter(r => r.t.toLowerCase().includes(q.toLowerCase()) || r.s.toLowerCase().includes(q.toLowerCase()))
    : SEARCH_SUGGESTIONS;
  if (!open) return null;
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="search-input-wrap">
          <Icon name="search" size={18}/>
          <input ref={ref} value={q} onChange={e => { setQ(e.target.value); setFocus(0); }} placeholder="Search grants, research, meetings…"/>
          <span className="kbd">ESC</span>
        </div>
        <div className="search-results">
          {results.length === 0 && <div style={{padding: 40, textAlign:'center', color:'var(--text-3)', fontSize:13}}>No results for "{q}"</div>}
          {results.map((r, i) => (
            <div key={i} className={`search-result ${focus === i ? 'focused' : ''}`} onMouseEnter={() => setFocus(i)}>
              <div className="icon"><Icon name={r.icon} size={16}/></div>
              <div style={{flex:1}}>
                <div className="t">{r.t}</div>
                <div className="s">{r.s}</div>
              </div>
              <span className="kbd">↵</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function MobileMenu({ open, onClose }) {
  if (!open) return null;
  return (
    <div className="mobile-menu">
      <button className="icon-btn" style={{position:'absolute', top:20, right:24}} onClick={onClose}><Icon name="close"/></button>
      <a href="#about" onClick={onClose}>About</a>
      <a href="#research" onClick={onClose}>Research</a>
      <a href="#grants" onClick={onClose}>Grant Resources</a>
      <a href="#partners" onClick={onClose}>Partners</a>
      <a href="#news" onClick={onClose}>News</a>
      <a href="#" onClick={onClose}>Log in</a>
    </div>
  );
}

function TweaksPanel({ heroVariant, setHeroVariant, cardStyle, setCardStyle }) {
  return (
    <div className="tweaks-panel">
      <h6>Tweaks</h6>
      <div className="tweaks-group">
        <label>Hero imagery</label>
        <div className="tweak-row">
          {['skyline','gradient','map'].map(v => (
            <button key={v} className={`tweak-btn ${heroVariant === v ? 'active' : ''}`} onClick={() => setHeroVariant(v)}>{v}</button>
          ))}
        </div>
      </div>
      <div className="tweaks-group">
        <label>Card style</label>
        <div className="tweak-row">
          {['flat','glass','bordered'].map(v => (
            <button key={v} className={`tweak-btn ${cardStyle === v ? 'active' : ''}`} onClick={() => setCardStyle(v)}>{v}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem('icjia-theme') || 'dark');
  const [searchOpen, setSearchOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [heroVariant, setHeroVariant] = useState(TWEAK_DEFAULTS.heroVariant);
  const [cardStyle, setCardStyle] = useState(TWEAK_DEFAULTS.cardStyle);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('icjia-theme', theme);
  }, [theme]);

  useEffect(() => {
    document.documentElement.setAttribute('data-cardstyle', cardStyle);
  }, [cardStyle]);

  // Tweaks protocol — register FIRST, then announce.
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setEditMode(true);
      if (e.data.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (edits) => {
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };

  // global shortcut for search
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); setSearchOpen(true); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return (
    <>
      <Nav
        onSearch={() => setSearchOpen(true)}
        onMenu={() => setMenuOpen(true)}
        theme={theme}
        onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
      />
      <Hero variant={heroVariant}/>
      <NewsSection/>
      <QuickLinksTabs/>
      <ResearchSection/>
      <Footer/>
      <SearchModal open={searchOpen} onClose={() => setSearchOpen(false)}/>
      <MobileMenu open={menuOpen} onClose={() => setMenuOpen(false)}/>
      {editMode && (
        <TweaksPanel
          heroVariant={heroVariant}
          setHeroVariant={(v) => { setHeroVariant(v); persist({ heroVariant: v }); }}
          cardStyle={cardStyle}
          setCardStyle={(v) => { setCardStyle(v); persist({ cardStyle: v }); }}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
